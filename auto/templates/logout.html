<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Logout</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        display: flex;
        height: 100vh;
        align-items: center;
        justify-content: center;
      }

      .box {
        background: white;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      }

      h2 {
        color: #333;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #0d6efd;
        color: white;
        text-decoration: none;
        border-radius: 6px;
      }

      a:hover {
        background: #084298;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>Sei uscito dal gestionale</h2>

      <p>La sessione è stata chiusa correttamente.</p>

      <a href="{% url 'login' %}"> Accedi di nuovo </a>
    </div>
  </body>
</html>
