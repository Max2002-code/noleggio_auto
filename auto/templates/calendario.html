{% extends "base.html" %} {% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold">
    <i class="bi bi-calendar3"></i>
    Calendario Noleggio
  </h2>

  <select id="filtroAuto" class="form-select" style="width: 250px">
    <option value="">Tutte le auto</option>
  </select>
</div>

<div class="card shadow border-0 calendario-card">
  <div class="card-body p-4">
    <div id="calendar"></div>
  </div>
</div>

<!-- MODALE DETTAGLI -->

<div class="modal fade" id="dettagliModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Dettaglio prenotazione</h5>

        <button
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>
      </div>

      <div class="modal-body">
        <p>
          🚗 <b>Auto:</b>
          <span id="auto"></span>
        </p>

        <p>
          👤 <b>Cliente:</b>
          <span id="cliente"></span>
        </p>

        <p>
          📞 <b>Telefono:</b>
          <span id="telefono"></span>
        </p>

        <p>
          📧 <b>Email:</b>
          <span id="email"></span>
        </p>

        <p>
          🪪 <b>Patente:</b>
          <span id="patente"></span>
        </p>

        <p>
          📄 <b>Documento:</b>
          <span id="documento"></span>
        </p>

        <hr />

        <p>
          🕒 <b>Ritiro:</b>
          <span id="ritiro"></span>
        </p>

        <p>
          🕒 <b>Riconsegna:</b>
          <span id="riconsegna"></span>
        </p>
      </div>
    </div>
  </div>
</div>

<link
  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
  rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    let calendarEl = document.getElementById("calendar");

    let calendar = new FullCalendar.Calendar(calendarEl, {
      locale: "it",

      initialView: "dayGridMonth",

      headerToolbar: {
        left: "prev,next today",

        center: "title",

        right: "multiMonthYear,dayGridMonth,timeGridWeek,timeGridDay",
      },

      buttonText: {
        today: "Oggi",

        month: "Mese",

        week: "Settimana",

        day: "Giorno",

        year: "Anno",
      },

      height: "auto",

      events: "/api/calendario/",

      eventDisplay: "block",

      eventClick: function (info) {
        let p = info.event.extendedProps;

        document.getElementById("auto").innerHTML = p.auto;

        document.getElementById("cliente").innerHTML = p.cliente;

        document.getElementById("telefono").innerHTML = p.telefono;

        document.getElementById("email").innerHTML = p.email;

        document.getElementById("patente").innerHTML = p.patente;

        document.getElementById("documento").innerHTML = p.documento;

        document.getElementById("ritiro").innerHTML =
          info.event.start.toLocaleString();

        document.getElementById("riconsegna").innerHTML =
          info.event.end.toLocaleString();

        let modal = new bootstrap.Modal(
          document.getElementById("dettagliModal"),
        );

        modal.show();
      },
    });

    calendar.render();
  });
</script>

<style>
  .calendario-card {
    border-radius: 25px;
  }

  #calendar {
    min-height: 700px;
  }

  .form-select {
    border-radius: 12px;
  }
</style>

{% endblock %}
